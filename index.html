<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Varjualune Lehtmetsa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #1a1a1a;
    --cream: #f5f0e8;
    --accent: #b03020;
    --mid: #3d3228;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* === HEADER === */
  header {
    background: var(--mid);
    padding: 32px 24px 24px;
    text-align: center;
    border-bottom: 4px solid var(--accent);
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 7vw, 3.4rem);
    color: var(--cream);
    letter-spacing: 0.02em;
    font-weight: 400;
  }
  header p {
    color: #c0a880;
    font-size: 0.78rem;
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* === MAIN === */
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 28px 16px 56px;
  }

  .section-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--mid);
    margin-bottom: 12px;
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    font-weight: 400;
  }

  /* === 3D MODEL === */
  .model-3d-wrapper {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 28px rgba(0,0,0,0.15);
    margin-bottom: 32px;
    border: 1px solid #d8cfc0;
  }
  .model-3d-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* === DRAWINGS GRID === */
  .drawings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 0;
  }

  .drawing-card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 14px rgba(0,0,0,0.09);
    border: 1px solid #d8cfc0;
    display: flex;
    flex-direction: column;
  }

  .drawing-thumb {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .drawing-thumb:active { opacity: 0.85; }
  .drawing-thumb img {
    width: 100%;
    height: auto;
    display: block;
  }

  .card-footer {
    padding: 10px 12px;
    background: #f0ebe0;
    border-top: 1px solid #d8cfc0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .card-footer .card-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--mid);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .card-footer .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .card-footer .download-btn:active { background: #8b1a0a; }
  .card-footer .download-btn svg {
    width: 12px; height: 12px; fill: white;
  }

  /* === LIGHTBOX === */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,15,10,0.93);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 6px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .lightbox-close {
    position: absolute;
    top: 14px;
    right: 20px;
    color: white;
    font-size: 2.5rem;
    cursor: pointer;
    opacity: 0.8;
    line-height: 1;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }
  .lightbox-label {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    color: #c0a880;
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <h1>Varjualune Lehtmetsa</h1>
  <p>Eskiisprojekt · 2026</p>
</header>

<main>
  <p class="section-label">3D mudel</p>
  <div class="model-3d-wrapper">
    <iframe src="3d.html" scrolling="no"></iframe>
  </div>

  <p class="section-label">Joonised</p>
  <div class="drawings-grid">

    <div class="drawing-card">
      <div class="drawing-thumb" onclick="openLightbox('eestvaade.svg', 'Eestvaade')">
        <img src="eestvaade.svg" alt="Eestvaade">
      </div>
      <div class="card-footer">
        <span class="card-label">Eestvaade</span>
        <a class="download-btn" href="eestvaade.pdf" download="eestvaade.pdf">
          <svg viewBox="0 0 16 16"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v1.5H3V14z"/></svg>
          PDF
        </a>
      </div>
    </div>

    <div class="drawing-card">
      <div class="drawing-thumb" onclick="openLightbox('kylgvaade.svg', 'Külgvaade')">
        <img src="kylgvaade.svg" alt="Külgvaade">
      </div>
      <div class="card-footer">
        <span class="card-label">Külgvaade</span>
        <a class="download-btn" href="kylgvaade.pdf" download="kylgvaade.pdf">
          <svg viewBox="0 0 16 16"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v1.5H3V14z"/></svg>
          PDF
        </a>
      </div>
    </div>

  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="">
  <span class="lightbox-label" id="lightbox-label"></span>
</div>

<script>
  function openLightbox(src, label) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-label').textContent = label;
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>

</body>
</html>
