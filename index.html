<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Varjualune Lehtmetsa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #1a1a1a;
    --cream: #f5f0e8;
    --accent: #b03020;
    --mid: #3d3228;
    --alt: #7a5010;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); color: var(--dark); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    background: var(--mid); padding: 32px 24px 24px;
    text-align: center; border-bottom: 4px solid var(--accent);
    position: relative;
  }
  header h1 { font-size: clamp(1.6rem, 5vw, 2.6rem); color: var(--cream); font-weight: 700; letter-spacing: -0.01em; }
  header .sub { color: #c0a880; font-size: 0.78rem; margin-top: 6px; font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase; }
  .badge {
    display: inline-block; background: var(--accent); color: white;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
    padding: 4px 12px; border-radius: 20px; margin-top: 10px; text-transform: uppercase;
  }

  main { max-width: 920px; margin: 0 auto; padding: 28px 16px 56px; }

  /* key data table */
  .key-data {
    background: white; border-radius: 10px; border: 1px solid #d8cfc0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 28px; overflow: hidden;
  }
  .key-data table { width: 100%; border-collapse: collapse; }
  .key-data th {
    background: var(--mid); color: var(--cream); font-size: 0.72rem;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em;
    padding: 10px 16px; text-align: left;
  }
  .key-data td { padding: 9px 16px; font-size: 0.88rem; border-bottom: 1px solid #e8e0d0; }
  .key-data tr:last-child td { border-bottom: none; }
  .key-data td:first-child { color: #666; width: 52%; }
  .key-data td:last-child { font-weight: 600; color: var(--dark); }
  .key-data .changed { color: var(--accent) !important; }
  .key-data .same { color: #559944 !important; }

  .section-label {
    font-size: 0.72rem; font-weight: 600; color: var(--mid);
    margin-bottom: 12px; border-left: 3px solid var(--accent);
    padding-left: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  }

  /* 3D preview */
  .model-preview {
    width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 28px rgba(0,0,0,0.15); margin-bottom: 32px;
    border: 1px solid #d8cfc0; cursor: pointer; position: relative;
    background: url('preview_3d2.png') center/cover no-repeat, #1a1a2e; -webkit-tap-highlight-color: transparent;
  }
  .model-preview .play-overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: rgba(20,15,10,0.4); transition: background 0.2s;
  }
  .model-preview:active .play-overlay { background: rgba(20,15,10,0.6); }
  .play-btn {
    width: 64px; height: 64px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .play-btn svg { width: 28px; height: 28px; fill: white; margin-left: 4px; }
  .play-label { color: white; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }

  /* 3D placeholder illustration */
  .model-placeholder {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; background: linear-gradient(135deg, #1a1a2e 0%, #2d2040 100%);
  }
  .roof-sketch { opacity: 0.4; }

  /* Drawings grid */
  .drawings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 600px) { .drawings-grid { grid-template-columns: 1fr; } }

  .drawing-card {
    background: white; border-radius: 10px; overflow: hidden;
    box-shadow: 0 2px 14px rgba(0,0,0,0.09); border: 1px solid #d8cfc0;
    display: flex; flex-direction: column;
  }
  .drawing-thumb { cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s; }
  .drawing-thumb:active { opacity: 0.85; }
  .drawing-thumb img { width: 100%; height: auto; display: block; }

  .card-footer {
    padding: 10px 12px; background: #f0ebe0; border-top: 1px solid #d8cfc0;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .card-label { font-size: 0.75rem; font-weight: 600; color: var(--mid); letter-spacing: 0.1em; text-transform: uppercase; }
  .download-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent); color: white; text-decoration: none;
    font-size: 0.70rem; font-weight: 600; padding: 5px 10px;
    border-radius: 5px; letter-spacing: 0.06em; text-transform: uppercase;
    white-space: nowrap; font-family: 'DM Sans', sans-serif;
  }
  .download-btn:active { background: #8b1a0a; }
  .download-btn svg { width: 12px; height: 12px; fill: white; }

  /* back link */
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--mid); text-decoration: none; font-size: 0.82rem; font-weight: 500;
    margin-bottom: 20px; opacity: 0.75; transition: opacity 0.15s;
  }
  .back-link:hover { opacity: 1; }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(20,15,10,0.93); z-index: 1000;
    justify-content: center; align-items: center; padding: 16px;
  }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 6px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  .lightbox-close { position: absolute; top: 14px; right: 20px; color: white; font-size: 2.5rem; cursor: pointer; opacity: 0.8; line-height: 1; font-weight: 300; }
  .lightbox-label { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); color: #c0a880; font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap; }

  /* hamburger menu */
  .hamburger {
    position: absolute; top: 14px; left: 16px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px; padding: 8px 10px; cursor: pointer;
    display: flex; flex-direction: column; gap: 5px; z-index: 100;
  }
  .hamburger span { display: block; width: 20px; height: 2px; background: var(--cream); border-radius: 2px; }
  .nav-menu {
    display: none; position: absolute; top: 58px; left: 16px;
    background: var(--mid); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 6px 0; min-width: 210px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200;
  }
  .nav-menu.open { display: block; }
  .nav-menu a {
    display: block; padding: 10px 18px;
    color: var(--cream); text-decoration: none;
    font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em;
    transition: background 0.15s;
  }
  .nav-menu a:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<header>
  <h1>Varjualune Lehtmetsa</h1>
  <p class="sub">2026 · Asümmeetriline katus</p>
  <div class="hamburger" onclick="toggleMenu()" id="burger">
    <span></span><span></span><span></span>
  </div>
  <div class="nav-menu" id="navMenu">
    <a href="https://isa1508.github.io/Varjualune/index_alt1.html">Sümmeetriline katus →</a>
    <a href="vergleich.html">Variantide võrdlus →</a>
  </div>
</header>

<main>
  <p class="section-label">3D mudel</p>
  <div class="model-preview" onclick="window.location.href='3d2.html'">
    <div class="play-overlay">
      <div class="play-btn">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <span class="play-label">Ava 3D mudel</span>
    </div>
  </div>

  <p class="section-label">Joonised</p>
  <div class="drawings-grid">

    <div class="drawing-card">
      <div class="drawing-thumb" onclick="openLightbox('eestvaade2.svg','Eestvaade')">
        <img src="eestvaade2.svg" alt="Eestvaade Alt.2">
      </div>
      <div class="card-footer">
        <span class="card-label">Eestvaade</span>
        <a class="download-btn" href="eestvaade2.svg" download="eestvaade_alt2.svg">
          <svg viewBox="0 0 16 16"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v1.5H3V14z"/></svg>
          SVG
        </a>
      </div>
    </div>

    <div class="drawing-card">
      <div class="drawing-thumb" onclick="openLightbox('kylgvaade2.svg','Külgvaade')">
        <img src="kylgvaade2.svg" alt="Külgvaade Alt.2">
      </div>
      <div class="card-footer">
        <span class="card-label">Külgvaade</span>
        <a class="download-btn" href="kylgvaade2.svg" download="kylgvaade_alt2.svg">
          <svg viewBox="0 0 16 16"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v1.5H3V14z"/></svg>
          SVG
        </a>
      </div>
    </div>

    <div class="drawing-card">
      <div class="drawing-thumb" onclick="openLightbox('tagakylg2.svg','Tagavaade')">
        <img src="tagakylg2.svg" alt="Tagavaade Alt.2">
      </div>
      <div class="card-footer">
        <span class="card-label">Tagavaade</span>
        <a class="download-btn" href="tagakylg2.svg" download="tagavaade_alt2.svg">
          <svg viewBox="0 0 16 16"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v1.5H3V14z"/></svg>
          SVG
        </a>
      </div>
    </div>

  </div>

</main>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="">
  <span class="lightbox-label" id="lightbox-label"></span>
</div>

<script>
  function openLightbox(src, label) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-label').textContent = label;
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  function toggleMenu() {
    document.getElementById('navMenu').classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#burger') && !e.target.closest('#navMenu')) {
      document.getElementById('navMenu').classList.remove('open');
    }
  });
</script>
</body>
</html>
